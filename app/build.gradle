apply plugin: 'com.android.application'
android {
    namespace "com.drix"
    compileSdk 33
    defaultConfig {
        applicationId "com.drix"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
            }
        }
    }
    externalNativeBuild {
        cmake {
            path "../native/CMakeLists.txt"
        }
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
