name: DriderX – Online Patch & Split Build

on:
  workflow_dispatch:   # Manual trigger
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'DXs/**'       # Infinite build loops se bachne ke liye

jobs:
  patch-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Clean pre-existing workspace configs for safe initialization
      - name: Clean Environment & Generate Wrapper Safely
        run: |
          rm -f settings.gradle build.gradle gradle.properties app/build.gradle
          echo "rootProject.name = 'DriderX'" > settings.gradle
          gradle wrapper --gradle-version 7.5.1

      - name: Create Necessary Project Structure Only
        run: |
          # Only creating required directories for App and Native Patch
          mkdir -p app/src/main/java/com/drix
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p native/src/main/cpp
          mkdir -p DXs

          # 1. Root Level Settings
          cat > settings.gradle << 'EOF'
          rootProject.name = "DriderX"
          include ':app'
          EOF

          # 2. App Build Configuration (Target SDK 28 for dynamic storage execution)
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace "com.drix"
              compileSdk 33
              defaultConfig {
                  applicationId "com.drix"
                  minSdk 21
                  targetSdk 28
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # 3. Themes Configuration (To prevent immediate launch crashes)
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">#FF6200EE</item>
                  <item name="colorPrimaryDark">#FF3700B3</item>
                  <item name="colorAccent">#FF03DAC5</item>
              </style>
          </resources>
          EOF

          # 4. Clean AndroidManifest.xml (Removed deprecated package attribute)
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              
              <application 
                  android:label="DriderX"
                  android:theme="@style/AppTheme">
                  <activity android:name="com.drix.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. MainActivity.java (Runtime Dynamic Native Downloader Engine)
          cat > app/src/main/java/com/drix/MainActivity.java << 'EOF'
          package com.drix;
          import androidx.appcompat.app.AppCompatActivity;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.widget.TextView;
          import android.util.Log;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;

          public class MainActivity extends AppCompatActivity {
              private TextView tv;
              private static final String PATCH_URL = "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/DXs/libnative-lib.so";
              
              public native String stringFromJNI();

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  tv = findViewById(R.id.sample_text);
                  tv.setText("Connecting to patch server...");

                  downloadAndLoadPatch();
              }

              private void downloadAndLoadPatch() {
                  new Thread(new Runnable() {
                      @Override
                      public void run() {
                          try {
                              File localLib = new File(getFilesDir(), "libnative-lib.so");
                              
                              URL url = new URL(PATCH_URL);
                              HttpURLConnection connection = (HttpURLConnection) url.openConnection();
                              connection.setConnectTimeout(15000);
                              connection.setReadTimeout(15000);
                              connection.connect();

                              if (connection.getResponseCode() == HttpURLConnection.HTTP_OK) {
                                  InputStream input = connection.getInputStream();
                                  FileOutputStream output = new FileOutputStream(localLib);

                                  byte[] buffer = new byte[4096];
                                  int bytesRead;
                                  while ((bytesRead = input.read(buffer)) != -1) {
                                      output.write(buffer, 0, bytesRead);
                                  }

                                  output.flush();
                                  output.close();
                                  input.close();

                                  // Load the dynamic patch safely into internal data context
                                  System.load(localLib.getAbsolutePath());

                                  new Handler(Looper.getMainLooper()).post(new Runnable() {
                                      @Override
                                      public void run() {
                                          try {
                                              tv.setText(stringFromJNI());
                                          } catch (Throwable t) {
                                              tv.setText("JNI Linkage Failed: " + t.getMessage());
                                          }
                                      }
                                  });
                              } else {
                                  showError("Patch missing on Git (HTTP " + connection.getResponseCode() + ")");
                              }
                          } catch (final Throwable t) {
                              Log.e("DriderX", "Execution catch caught", t);
                              showError("Sync status: " + t.getMessage());
                          }
                      }
                  }).start();
              }

              private void showError(final String msg) {
                  new Handler(Looper.getMainLooper()).post(new Runnable() {
                      @Override
                      public void run() {
                          tv.setText(msg);
                      }
                  });
              }
          }
          EOF

          # 6. FIXED layout file (Changed match_match to match_parent)
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:gravity="center"
              android:orientation="vertical">
              <TextView android:id="@+id/sample_text"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:textSize="16sp"
                  android:textColor="#000000"
                  android:text="Initializing Engine..." />
          </LinearLayout>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">DriderX</string>
          </resources>
          EOF

          # 7. Native CMake & Source Configs
          cat > native/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.18)
          project("native-lib")
          add_library(native-lib SHARED src/main/cpp/native-lib.cpp)
          find_library(log-lib log)
          target_link_libraries(native-lib ${log-lib})
          EOF

          cat > native/src/main/cpp/native-lib.cpp << 'EOF'
          #include <jni.h>
          #include <string>
          extern "C" JNIEXPORT jstring JNICALL
          Java_com_drix_MainActivity_stringFromJNI(JNIEnv* env, jobject thiz) {
              return env->NewStringUTF("Hello from DriderX Online Live Patch!");
          }
          EOF

          # 8. Gradle Core Properties
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral(); }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.0' }
          }
          allprojects { repositories { google(); mavenCentral(); } }
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

          cat > README.md << 'EOF'
          # DriderX
          Android Split Patch System. Base APK links dynamically to separate libnative-lib.so inside DXs.
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK & NDK Toolchain
        uses: android-actions/setup-android@v3

      - name: Install NDK Components
        run: sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Compile Library Independently (Standalone Compilation)
        run: |
          mkdir -p native/build
          cd native/build
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/25.2.9519653/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-21 \
                ..
          make -j$(nproc)
          cp libnative-lib.so ../../DXs/
          echo "✅ Isolated Native `.so` compiled successfully into DXs/"

      - name: Compile Pure Base APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk DXs/driderx-base.apk
          echo "✅ Clean Base APK compiled and staged inside DXs/"

      - name: Clean Unused Workspace Bloat before Push
        run: |
          # Keep only your core tracking folders and clean temporary build items
          rm -rf native/build app/build .gradle build

      - name: Deploy Isolated Binaries directly to DXs Folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy production ready isolated binaries to DXs [skip ci]" || echo "No changes"
          git push origin HEAD:${{ github.ref_name }}
