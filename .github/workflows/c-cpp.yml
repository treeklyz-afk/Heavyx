name: DriderX – Pure Build System (No Overwrite)

on:
  workflow_dispatch:   # Manual trigger karne ke liye
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'DXs/**'       # CRITICAL: Isse push hone par infinite build loop nahi banega

jobs:
  build-project:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Binaries ko DXs folder me push karne ke liye write access
    steps:
      # STEP 1: Aapke repo ka latest code checkout (fetch) karega
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # STEP 2: Environment setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK & Toolchain
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake Components
        run: sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"

      # STEP 3: Safe Wrapper Check (Agar repo me gradlew nahi hai toh generate karega)
      - name: Ensure Gradle Wrapper Exists
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Gradle wrapper missing! Generating a safe fallback wrapper..."
            echo "rootProject.name = 'DriderX'" > settings.gradle.tmp
            [ -f settings.gradle ] || mv settings.gradle.tmp settings.gradle
            gradle wrapper --gradle-version 7.5.1
          fi

      # STEP 4: Standalone C++ Library Compilation
      - name: Compile Native C++ Library (.so)
        run: |
          if [ -d "native" ]; then
            mkdir -p native/build
            cd native/build
            cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/25.2.9519653/build/cmake/android.toolchain.cmake \
                  -DANDROID_ABI=arm64-v8a \
                  -DANDROID_PLATFORM=android-21 \
                  ..
            make -j$(nproc)
            mkdir -p ../../DXs
            cp libnative-lib.so ../../DXs/
            echo "✅ Native .so compiled successfully from your repository source!"
          else
            echo "⚠️ 'native' folder not found in repo, skipping C++ compilation."
          fi

      # STEP 5: Android Base APK Compilation
      - name: Compile Android Base APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
          mkdir -p DXs
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk DXs/driderx-base.apk
            echo "✅ Base APK compiled successfully from your repository source!"
          else
            cp app/build/outputs/apk/debug/*.apk DXs/driderx-base.apk 2>/dev/null || echo "⚠️ APK search fallback applied"
          fi

      # STEP 6: Clean build cache to keep repo lightweight
      - name: Clean Workspace Intermediates
        run: |
          rm -rf native/build app/build .gradle build 2>/dev/null || true

      # STEP 7: DXs folder ko stage karke aapki repo me push karna
      - name: Push Compiled Binaries to DXs Folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Sirf DXs folder ko track aur push karenge
          git add DXs/
          
          git commit -m "Automated Production Build: Sync APK and Native Libs [skip ci]" || echo "No changes detected to commit"
          git push origin HEAD:${{ github.ref_name }}
