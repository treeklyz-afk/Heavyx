name: DriderX – Build & Deploy to DXs Folder

on:
  workflow_dispatch:   # Manual trigger karne ke liye
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'DXs/**'       # CRITICAL: Isse push hone par infinite build loop nahi banega

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Repo me DXs folder push karne ke liye write permission
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake
        run: |
          sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK and Native Libs
        run: ./gradlew assembleDebug

      - name: Collect Artifacts into DXs Folder
        run: |
          # DXs folder create karein
          mkdir -p DXs
          
          # 1. APK copy karein
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk DXs/driderx-debug.apk
            echo "✅ APK successfully copied to DXs/"
          else
            echo "❌ APK not found!"
            exit 1
          fi
          
          # 2. Saari compiled .so libraries dhoondh kar copy karein
          echo "Searching for compiled native (.so) libraries..."
          find app/build/intermediates/merged_native_libs/debug/out/lib/ -name "*.so" -exec cp {} DXs/ \; 2>/dev/null || true
          
          # Backup search agar paths diff ho
          find app/build/intermediates/cmake/debug/obj/ -name "*.so" -exec cp -r {} DXs/ \; 2>/dev/null || true

          # Verify folder contents
          echo "Current DXs Folder Contents:"
          ls -la DXs/

      - name: Commit and Push Binaries to DXs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Sirf DXs folder ko stage karein
          git add DXs/
          
          # Commit aur push safely with [skip ci]
          git commit -m "Automated Build: Updated APK and Native Libs in DXs [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}
