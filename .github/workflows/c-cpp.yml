name: DriderX – Online Patch & Split Build

on:
  workflow_dispatch:   # Manual trigger
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'DXs/**'       # Infinite build loops se bachne ke liye

jobs:
  patch-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # STEP 1: Workspace cleanup and wrapper setup
      - name: Clean Environment & Generate Wrapper Safely
        run: |
          rm -f settings.gradle build.gradle gradle.properties app/build.gradle
          echo "rootProject.name = 'DriderX'" > settings.gradle
          gradle wrapper --gradle-version 7.5.1

      # STEP 2: Injection of advanced hybrid codebase
      - name: Create Structure & Advanced Driver App Injection
        run: |
          mkdir -p app/src/main/java/com/drix
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p native/src/main/cpp
          mkdir -p DXs

          # 1. Root Level Settings
          cat > settings.gradle << 'EOF'
          rootProject.name = "DriderX"
          include ':app'
          EOF

          # 2. App Build Configuration (Target SDK 28 for dynamic storage execution)
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace "com.drix"
              compileSdk 33
              defaultConfig {
                  applicationId "com.drix"
                  minSdk 21
                  targetSdk 28
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # 3. iOS Pure Dark Theme Configuration
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">#000000</item>
                  <item name="colorPrimaryDark">#000000</item>
                  <item name="colorAccent">#0A84FF</item>
              </style>
          </resources>
          EOF

          # 4. Clean AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              
              <application 
                  android:label="DriderX"
                  android:theme="@style/AppTheme">
                  <activity android:name="com.drix.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. MainActivity.java (With Smart Auto-Fallback System)
          cat > app/src/main/java/com/drix/MainActivity.java << 'EOF'
          package com.drix;

          import androidx.appcompat.app.AppCompatActivity;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.View;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.util.Log;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.util.Random;

          public class MainActivity extends AppCompatActivity {
              private TextView tvStatus;
              private TextView tvDriverStatus;
              private EditText etPickup, etDrop;
              private Button btnFindDriver;
              private LinearLayout resultLayout;
              private boolean isPatchLoaded = false;

              private static final String PATCH_URL = "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/DXs/libnative-lib.so";
              
              public native String findDriverNative(String pickup, String drop);

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  tvStatus = findViewById(R.id.sample_text);
                  tvDriverStatus = findViewById(R.id.tv_driver_status);
                  etPickup = findViewById(R.id.et_pickup);
                  etDrop = findViewById(R.id.et_drop);
                  btnFindDriver = findViewById(R.id.btn_find_driver);
                  resultLayout = findViewById(R.id.result_layout);

                  // Button is always clickable from start!
                  btnFindDriver.setEnabled(true);
                  tvStatus.setText("DriderX Engine: Core Initialized");

                  // Try loading online patch in background
                  downloadAndLoadPatch();

                  btnFindDriver.setOnClickListener(new View.OnClickListener() {
                      @Override
                      public void onClick(View v) {
                          String pickupTxt = etPickup.getText().toString().trim();
                          String dropTxt = etDrop.getText().toString().trim();

                          if (pickupTxt.isEmpty() || dropTxt.isEmpty()) {
                              resultLayout.setVisibility(View.VISIBLE);
                              tvDriverStatus.setText("Please enter valid locations.");
                              return;
                          }

                          resultLayout.setVisibility(View.VISIBLE);

                          if (isPatchLoaded) {
                              try {
                                  // Run advanced C++ algorithms if patch is live
                                  String dynamicResult = findDriverNative(pickupTxt, dropTxt);
                                  tvDriverStatus.setText(dynamicResult);
                              } catch (Throwable t) {
                                  // Fallback to local execution if link drops
                                  runJavaFallback(pickupTxt, dropTxt);
                              }
                          } else {
                              // Instant fallback if patch isn't loaded yet
                              runJavaFallback(pickupTxt, dropTxt);
                          }
                      }
                  });
              }

              private void runJavaFallback(String pickup, String drop) {
                  String[] drivers = {"Vikram Singh [Rider Pro]", "Rajesh Kumar [Elite]", "Aman Verma [X-Prime]"};
                  String[] vehicles = {"(KA-03-HA-4321)", "(DL-01-CA-9876)", "(BR-01-PC-5543)"};
                  
                  Random rand = new Random();
                  int idx = rand.nextInt(3);
                  int eta = 3 + rand.nextInt(5);

                  String res = "⚡ Driver Matched (Internal Mode)!\n\n"
                             + "Driver: " + drivers[idx] + "\n"
                             + "Vehicle: " + vehicles[idx] + "\n"
                             + "Route: " + pickup + " -> " + drop + "\n"
                             + "Status: Arriving in " + eta + " mins";
                  
                  tvDriverStatus.setText(res);
              }

              private void downloadAndLoadPatch() {
                  new Thread(new Runnable() {
                      @Override
                      public void run() {
                          try {
                              File localLib = new File(getFilesDir(), "libnative-lib.so");
                              URL url = new URL(PATCH_URL);
                              HttpURLConnection connection = (HttpURLConnection) url.openConnection();
                              connection.setConnectTimeout(8000);
                              connection.setReadTimeout(8000);
                              connection.connect();

                              if (connection.getResponseCode() == HttpURLConnection.HTTP_OK) {
                                  InputStream input = connection.getInputStream();
                                  FileOutputStream output = new FileOutputStream(localLib);
                                  byte[] buffer = new byte[4096];
                                  int bytesRead;
                                  while ((bytesRead = input.read(buffer)) != -1) {
                                      output.write(buffer, 0, bytesRead);
                                  }
                                  output.flush();
                                  output.close();
                                  input.close();

                                  System.load(localLib.getAbsolutePath());
                                  isPatchLoaded = true;

                                  new Handler(Looper.getMainLooper()).post(new Runnable() {
                                      @Override
                                      public void run() {
                                          tvStatus.setText("DriderX Engine: High-Performance Patch Active");
                                      }
                                  });
                              } else {
                                  updateStatus("DriderX Engine: Ready (Cloud sync pending)");
                              }
                          } catch (final Throwable t) {
                              updateStatus("DriderX Engine: Ready (Standby Mode)");
                          }
                      }
                  }).start();
              }

              private void updateStatus(final String msg) {
                  new Handler(Looper.getMainLooper()).post(new Runnable() {
                      @Override
                      public void run() {
                          tvStatus.setText(msg);
                      }
                  });
              }
          }
          EOF

          # 6. FIXED iOS Pitch Black Layout
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#000000"
              android:padding="20dp">

              <TextView
                  android:id="@+id/header_title"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_marginTop="24dp"
                  android:text="DriderX Ride"
                  android:textColor="#FFFFFF"
                  android:textSize="28sp"
                  android:textStyle="bold" />

              <TextView
                  android:id="@+id/sample_text"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_below="@id/header_title"
                  android:layout_marginTop="8dp"
                  android:text="Initializing secure core..."
                  android:textColor="#8E8E93"
                  android:textSize="14sp" />

              <LinearLayout
                  android:id="@+id/location_card"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_centerInParent="true"
                  android:orientation="vertical">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:background="#1C1C1E"
                      android:orientation="vertical"
                      android:padding="16dp">

                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="PICKUP LOCATION"
                          android:textColor="#0A84FF"
                          android:textSize="11sp"
                          android:textStyle="bold" />

                      <EditText
                          android:id="@+id/et_pickup"
                          android:layout_width="match_parent"
                          android:layout_height="44dp"
                          android:background="@android:color/transparent"
                          android:hint="Where from?"
                          android:textColor="#FFFFFF"
                          android:textColorHint="#48484A"
                          android:textSize="16sp"
                          android:importantForAutofill="no"
                          android:inputType="textPostalAddress" />

                      <View
                          android:layout_width="match_parent"
                          android:layout_height="0.5dp"
                          android:layout_marginTop="12dp"
                          android:layout_marginBottom="12dp"
                          android:background="#38383A" />

                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="DROP OFF LOCATION"
                          android:textColor="#30D158"
                          android:textSize="11sp"
                          android:textStyle="bold" />

                      <EditText
                          android:id="@+id/et_drop"
                          android:layout_width="match_parent"
                          android:layout_height="44dp"
                          android:background="@android:color/transparent"
                          android:hint="Where to?"
                          android:textColor="#FFFFFF"
                          android:textColorHint="#48484A"
                          android:textSize="16sp"
                          android:importantForAutofill="no"
                          android:inputType="textPostalAddress" />
                  </LinearLayout>

                  <Button
                      android:id="@+id/btn_find_driver"
                      android:layout_width="match_parent"
                      android:layout_height="54dp"
                      android:layout_marginTop="24dp"
                      android:backgroundTint="#FFFFFF"
                      android:text="Request DriderX"
                      android:textColor="#000000"
                      android:textSize="17sp"
                      android:textStyle="bold"
                      android:textAllCaps="false" />
              </LinearLayout>

              <LinearLayout
                  android:id="@+id/result_layout"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_below="@id/location_card"
                  android:layout_marginTop="20dp"
                  android:background="#1C1C1E"
                  android:orientation="vertical"
                  android:padding="16dp"
                  android:visibility="invisible">

                  <TextView
                      android:id="@+id/tv_driver_status"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:textColor="#FFFFFF"
                      android:textSize="15sp" />
              </LinearLayout>
          </RelativeLayout>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">DriderX</string>
          </resources>
          EOF

          # 7. Advanced Native C++ Driver Allocation Core Logic
          cat > native/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.18)
          project("native-lib")
          set(CMAKE_CXX_STANDARD 17)
          add_library(native-lib SHARED src/main/cpp/native-lib.cpp)
          find_library(log-lib log)
          target_link_libraries(native-lib ${log-lib})
          EOF

          cat > native/src/main/cpp/native-lib.cpp << 'EOF'
          #include <jni.h>
          #include <string>
          #include <random>
          #include <sstream>

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_drix_MainActivity_findDriverNative(JNIEnv* env, jobject thiz, jstring pickup, jstring drop) {
              
              const char* pickupChars = env->GetStringUTFChars(pickup, nullptr);
              const char* dropChars = env->GetStringUTFChars(drop, nullptr);
              
              std::string pickupLocation(pickupChars);
              std::string dropLocation(dropChars);
              
              env->ReleaseStringUTFChars(pickup, pickupChars);
              env->ReleaseStringUTFChars(drop, dropChars);
              
              std::string drivers[] = {"Vikram Singh [Rider Pro]", "Rajesh Kumar [Elite]", "Aman Verma [X-Prime]"};
              std::string vehicles[] = {"(KA-03-HA-4321)", "(DL-01-CA-9876)", "(BR-01-PC-5543)"};
              
              std::random_device rd;
              std::mt19937 gen(rd());
              std::uniform_int_distribution<> dist(0, 2);
              std::uniform_int_distribution<> timeDist(2, 7);
              
              int index = dist(gen);
              int eta = timeDist(gen);
              
              std::stringstream response;
              response << "⚡ Driver Matched (Cloud Core Live)!\n\n"
                       << "Driver: " << drivers[index] << "\n"
                       << "Vehicle: " << vehicles[index] << "\n"
                       << "Route: " << pickupLocation << " -> " << dropLocation << "\n"
                       << "Status: Arriving in " << eta << " mins";
                       
              return env->NewStringUTF(response.str().c_str());
          }
          EOF

          # 8. Main Configuration Scripts
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral(); }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.0' }
          }
          allprojects { repositories { google(); mavenCentral(); } }
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

          cat > README.md << 'EOF'
          # DriderX
          Advanced iOS style Dark UI Ride App with dynamic fail-safe layout routing.
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK & NDK Toolchain
        uses: android-actions/setup-android@v3

      - name: Install NDK Components
        run: sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"

      # STEP 3: Pure C++ standalone compilation
      - name: Compile Library Independently
        run: |
          mkdir -p native/build
          cd native/build
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/25.2.9519653/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-21 \
                ..
          make -j$(nproc)
          cp libnative-lib.so ../../DXs/
          echo "✅ Isolated Native `.so` compiled successfully into DXs/"

      # STEP 4: Base APK compilation
      - name: Compile Pure Base APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk DXs/driderx-base.apk
          echo "✅ Clean Base APK compiled and staged inside DXs/"

      - name: Clean Unused Workspace Bloat before Push
        run: |
          rm -rf native/build app/build .gradle build

      # STEP 5: Secure Git Deploy payload mapping
      - name: Deploy Isolated Binaries directly to DXs Folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy 1000% Crash-Proof iOS UI Layout & Java Matcher Engine [skip ci]" || echo "No changes"
          git push origin HEAD:${{ github.ref_name }}
