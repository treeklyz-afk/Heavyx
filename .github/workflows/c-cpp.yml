name: DriderX – iOS Style Full‑Screen App

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'DXs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean & Setup Wrapper
        run: |
          rm -f settings.gradle build.gradle gradle.properties app/build.gradle
          echo "rootProject.name = 'DriderX'" > settings.gradle
          gradle wrapper --gradle-version 7.5.1

      - name: Inject Full iOS‑Style Codebase
        run: |
          # Create directories
          mkdir -p app/src/main/java/com/drix
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/animator
          mkdir -p app/src/main/res/raw
          mkdir -p app/src/main/cpp
          mkdir -p DXs

          # ---- settings.gradle ----
          cat > settings.gradle << 'EOF'
          rootProject.name = "DriderX"
          include ':app'
          EOF

          # ---- app/build.gradle (with Glide & Material) ----
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace "com.drix"
              compileSdk 33
              defaultConfig {
                  applicationId "com.drix"
                  minSdk 21
                  targetSdk 28
                  versionCode 1
                  versionName "1.0"
                  externalNativeBuild {
                      cmake {
                          cppFlags "-std=c++17"
                          arguments "-DANDROID_STL=c++_shared"
                      }
                  }
              }
              externalNativeBuild {
                  cmake {
                      path "src/main/cpp/CMakeLists.txt"
                      version "3.18.1"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.cardview:cardview:1.0.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.0'
              implementation 'com.github.bumptech.glide:glide:4.15.1'
              annotationProcessor 'com.github.bumptech.glide:compiler:4.15.1'
          }
          EOF

          # ---- AndroidManifest.xml (full screen activities) ----
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="DriderX"
                  android:theme="@style/AppTheme">
                  <activity android:name="com.drix.SplashActivity"
                      android:exported="true"
                      android:theme="@style/FullScreenTheme">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <activity android:name="com.drix.MainActivity"
                      android:theme="@style/AppTheme"
                      android:exported="false" />
                  <activity android:name="com.drix.RideDetailActivity"
                      android:theme="@style/FullScreenTheme"
                      android:exported="false" />
              </application>
          </manifest>
          EOF

          # ---- styles.xml (themes & full screen) ----
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources>
              <style name="AppTheme" parent="Theme.MaterialComponents.Light.NoActionBar">
                  <item name="colorPrimary">#000000</item>
                  <item name="colorPrimaryDark">#000000</item>
                  <item name="colorAccent">#0A84FF</item>
                  <item name="android:windowBackground">@drawable/bg_gradient</item>
                  <item name="android:windowFullscreen">false</item>
              </style>
              <style name="FullScreenTheme" parent="Theme.MaterialComponents.Light.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowBackground">@drawable/bg_gradient</item>
                  <item name="android:windowContentOverlay">@null</item>
              </style>
          </resources>
          EOF

          # ---- strings.xml ----
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">DriderX</string>
              <string name="loading">Loading…</string>
          </resources>
          EOF

          # ---- drawable/bg_gradient.xml ----
          cat > app/src/main/res/drawable/bg_gradient.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient
                  android:angle="135"
                  android:startColor="#0F0F0F"
                  android:endColor="#1A1A2E"
                  android:type="linear" />
          </shape>
          EOF

          # ---- drawable/btn_rounded.xml ----
          cat > app/src/main/res/drawable/btn_rounded.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <corners android:radius="28dp" />
              <solid android:color="#0A84FF" />
          </shape>
          EOF

          # ---- drawable/btn_rounded_white.xml ----
          cat > app/src/main/res/drawable/btn_rounded_white.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <corners android:radius="28dp" />
              <solid android:color="#FFFFFF" />
          </shape>
          EOF

          # ---- animator/card_slide_in.xml ----
          cat > app/src/main/res/animator/card_slide_in.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <set xmlns:android="http://schemas.android.com/apk/res/android">
              <objectAnimator
                  android:propertyName="translationY"
                  android:valueType="floatType"
                  android:valueFrom="300"
                  android:valueTo="0"
                  android:duration="500"
                  android:interpolator="@android:anim/decelerate_interpolator" />
              <objectAnimator
                  android:propertyName="alpha"
                  android:valueType="floatType"
                  android:valueFrom="0"
                  android:valueTo="1"
                  android:duration="400"
                  android:interpolator="@android:anim/decelerate_interpolator" />
          </set>
          EOF

          # ---- raw/loading.gif (placeholder - we'll use a URL in code) ----
          # We'll use Glide to load from URL, no need for local GIF

          # ---- layout/activity_splash.xml ----
          cat > app/src/main/res/layout/activity_splash.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ConstraintLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@drawable/bg_gradient">

              <ImageView
                  android:id="@+id/iv_loading"
                  android:layout_width="150dp"
                  android:layout_height="150dp"
                  app:layout_constraintBottom_toTopOf="@+id/tv_loading_text"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toTopOf="parent"
                  app:layout_constraintVertical_bias="0.4" />

              <TextView
                  android:id="@+id/tv_loading_text"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_marginTop="24dp"
                  android:text="DriderX"
                  android:textColor="#FFFFFF"
                  android:textSize="28sp"
                  android:textStyle="bold"
                  app:layout_constraintBottom_toBottomOf="parent"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toBottomOf="@+id/iv_loading"
                  app:layout_constraintVertical_bias="0.2" />

              <ProgressBar
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_marginTop="16dp"
                  android:indeterminateTint="#0A84FF"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toBottomOf="@+id/tv_loading_text" />
          </ConstraintLayout>
          EOF

          # ---- layout/activity_main.xml (iOS style) ----
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ConstraintLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@drawable/bg_gradient"
              android:padding="16dp">

              <androidx.appcompat.widget.Toolbar
                  android:id="@+id/toolbar"
                  android:layout_width="match_parent"
                  android:layout_height="?attr/actionBarSize"
                  android:background="@android:color/transparent"
                  app:titleTextColor="#FFFFFF"
                  app:title="DriderX"
                  app:subtitle="Smart Ride Matching"
                  app:layout_constraintTop_toTopOf="parent" />

              <TextView
                  android:id="@+id/tv_status"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_marginTop="8dp"
                  android:text="Initializing..."
                  android:textColor="#B0B0B0"
                  android:textSize="12sp"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toBottomOf="@+id/toolbar" />

              <TextView
                  android:id="@+id/tv_ride_count"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Available: 0"
                  android:textColor="#4CAF50"
                  android:textSize="12sp"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintTop_toBottomOf="@+id/toolbar" />

              <androidx.cardview.widget.CardView
                  android:id="@+id/location_card"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_marginTop="24dp"
                  app:cardCornerRadius="24dp"
                  app:cardElevation="12dp"
                  app:cardBackgroundColor="#1E1E1E"
                  app:layout_constraintTop_toBottomOf="@+id/tv_status">

                  <ConstraintLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:padding="20dp">

                      <TextView
                          android:id="@+id/tv_pickup_label"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="PICKUP LOCATION"
                          android:textColor="#0A84FF"
                          android:textSize="11sp"
                          android:textStyle="bold"
                          app:layout_constraintStart_toStartOf="parent"
                          app:layout_constraintTop_toTopOf="parent" />

                      <EditText
                          android:id="@+id/et_pickup"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:background="@android:color/transparent"
                          android:hint="Where from?"
                          android:textColor="#FFFFFF"
                          android:textColorHint="#888888"
                          android:textSize="16sp"
                          android:inputType="textPostalAddress"
                          app:layout_constraintEnd_toEndOf="parent"
                          app:layout_constraintStart_toStartOf="parent"
                          app:layout_constraintTop_toBottomOf="@+id/tv_pickup_label" />

                      <View
                          android:id="@+id/divider1"
                          android:layout_width="match_parent"
                          android:layout_height="1dp"
                          android:layout_marginTop="8dp"
                          android:background="#333333"
                          app:layout_constraintTop_toBottomOf="@+id/et_pickup" />

                      <TextView
                          android:id="@+id/tv_drop_label"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:layout_marginTop="16dp"
                          android:text="DROP OFF LOCATION"
                          android:textColor="#30D158"
                          android:textSize="11sp"
                          android:textStyle="bold"
                          app:layout_constraintStart_toStartOf="parent"
                          app:layout_constraintTop_toBottomOf="@+id/divider1" />

                      <EditText
                          android:id="@+id/et_drop"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:background="@android:color/transparent"
                          android:hint="Where to?"
                          android:textColor="#FFFFFF"
                          android:textColorHint="#888888"
                          android:textSize="16sp"
                          android:inputType="textPostalAddress"
                          app:layout_constraintEnd_toEndOf="parent"
                          app:layout_constraintStart_toStartOf="parent"
                          app:layout_constraintTop_toBottomOf="@+id/tv_drop_label" />
                  </ConstraintLayout>
              </androidx.cardview.widget.CardView>

              <Button
                  android:id="@+id/btn_find_driver"
                  android:layout_width="match_parent"
                  android:layout_height="56dp"
                  android:layout_marginTop="24dp"
                  android:background="@drawable/btn_rounded"
                  android:text="🚀 Find Driver"
                  android:textColor="#FFFFFF"
                  android:textSize="18sp"
                  android:textStyle="bold"
                  android:textAllCaps="false"
                  app:layout_constraintTop_toBottomOf="@+id/location_card" />

              <ProgressBar
                  android:id="@+id/progress_bar"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_marginTop="16dp"
                  android:visibility="gone"
                  android:indeterminateTint="#0A84FF"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toBottomOf="@+id/btn_find_driver" />

              <androidx.cardview.widget.CardView
                  android:id="@+id/result_card"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_marginTop="16dp"
                  android:visibility="gone"
                  app:cardCornerRadius="24dp"
                  app:cardElevation="12dp"
                  app:cardBackgroundColor="#2C2C2E"
                  app:layout_constraintTop_toBottomOf="@+id/progress_bar">

                  <ConstraintLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:padding="20dp">

                      <TextView
                          android:id="@+id/tv_driver_status"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:textColor="#FFFFFF"
                          android:textSize="16sp"
                          android:textStyle="bold"
                          app:layout_constraintEnd_toEndOf="parent"
                          app:layout_constraintStart_toStartOf="parent"
                          app:layout_constraintTop_toTopOf="parent" />

                      <Button
                          android:id="@+id/btn_cancel_ride"
                          android:layout_width="match_parent"
                          android:layout_height="48dp"
                          android:layout_marginTop="16dp"
                          android:backgroundTint="#FF5252"
                          android:text="Cancel Ride"
                          android:textColor="#FFFFFF"
                          android:textStyle="bold"
                          app:layout_constraintTop_toBottomOf="@+id/tv_driver_status" />
                  </ConstraintLayout>
              </androidx.cardview.widget.CardView>

              <TextView
                  android:id="@+id/tv_nearby"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_marginTop="24dp"
                  android:text="Nearby Drivers"
                  android:textColor="#FFFFFF"
                  android:textSize="18sp"
                  android:textStyle="bold"
                  app:layout_constraintTop_toBottomOf="@+id/result_card" />

              <androidx.cardview.widget.CardView
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_marginTop="8dp"
                  app:cardCornerRadius="20dp"
                  app:cardElevation="8dp"
                  app:cardBackgroundColor="#1C1C1E"
                  app:layout_constraintBottom_toBottomOf="parent"
                  app:layout_constraintTop_toBottomOf="@+id/tv_nearby">

                  <androidx.recyclerview.widget.RecyclerView
                      android:id="@+id/recycler_drivers"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"
                      android:padding="8dp"
                      android:clipToPadding="false" />
              </androidx.cardview.widget.CardView>
          </ConstraintLayout>
          EOF

          # ---- layout/activity_ride_detail.xml (full screen) ----
          cat > app/src/main/res/layout/activity_ride_detail.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ConstraintLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@drawable/bg_gradient"
              android:padding="16dp">

              <androidx.appcompat.widget.Toolbar
                  android:id="@+id/toolbar"
                  android:layout_width="match_parent"
                  android:layout_height="?attr/actionBarSize"
                  android:background="@android:color/transparent"
                  app:navigationIcon="?attr/homeAsUpIndicator"
                  app:title="Ride Details"
                  app:titleTextColor="#FFFFFF"
                  app:layout_constraintTop_toTopOf="parent" />

              <androidx.cardview.widget.CardView
                  android:id="@+id/ride_card"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_marginTop="24dp"
                  app:cardCornerRadius="24dp"
                  app:cardElevation="12dp"
                  app:cardBackgroundColor="#2C2C2E"
                  app:layout_constraintTop_toBottomOf="@+id/toolbar">

                  <ConstraintLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:padding="24dp">

                      <ImageView
                          android:id="@+id/iv_driver_avatar"
                          android:layout_width="80dp"
                          android:layout_height="80dp"
                          android:src="@drawable/btn_rounded"
                          app:layout_constraintStart_toStartOf="parent"
                          app:layout_constraintTop_toTopOf="parent" />

                      <TextView
                          android:id="@+id/tv_driver_name"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_marginStart="16dp"
                          android:text="Driver Name"
                          android:textColor="#FFFFFF"
                          android:textSize="20sp"
                          android:textStyle="bold"
                          app:layout_constraintEnd_toEndOf="parent"
                          app:layout_constraintStart_toEndOf="@+id/iv_driver_avatar"
                          app:layout_constraintTop_toTopOf="@+id/iv_driver_avatar" />

                      <TextView
                          android:id="@+id/tv_driver_vehicle"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:text="Vehicle (Reg)"
                          android:textColor="#B0B0B0"
                          android:textSize="14sp"
                          app:layout_constraintEnd_toEndOf="parent"
                          app:layout_constraintStart_toStartOf="@+id/tv_driver_name"
                          app:layout_constraintTop_toBottomOf="@+id/tv_driver_name" />

                      <TextView
                          android:id="@+id/tv_driver_rating"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:layout_marginTop="8dp"
                          android:text="4.5 ⭐"
                          android:textColor="#FFC107"
                          android:textSize="14sp"
                          app:layout_constraintStart_toStartOf="@+id/tv_driver_name"
                          app:layout_constraintTop_toBottomOf="@+id/tv_driver_vehicle" />

                      <TextView
                          android:id="@+id/tv_eta"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="ETA: 5 min"
                          android:textColor="#0A84FF"
                          android:textSize="14sp"
                          android:layout_marginStart="16dp"
                          app:layout_constraintStart_toEndOf="@+id/tv_driver_rating"
                          app:layout_constraintTop_toBottomOf="@+id/tv_driver_vehicle" />
                  </ConstraintLayout>
              </androidx.cardview.widget.CardView>

              <!-- Additional details could go here -->

          </ConstraintLayout>
          EOF

          # ---- layout/item_driver.xml (same as before) ----
          cat > app/src/main/res/layout/item_driver.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ConstraintLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="wrap_content"
              android:padding="12dp"
              android:background="?android:attr/selectableItemBackground">

              <TextView
                  android:id="@+id/tv_driver_name"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:text="Driver Name"
                  android:textColor="#FFFFFF"
                  android:textSize="16sp"
                  android:textStyle="bold"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toTopOf="parent" />

              <TextView
                  android:id="@+id/tv_driver_vehicle"
                  android:layout_width="0dp"
                  android:layout_height="wrap_content"
                  android:text="Vehicle (Reg)"
                  android:textColor="#B0B0B0"
                  android:textSize="14sp"
                  app:layout_constraintEnd_toEndOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toBottomOf="@+id/tv_driver_name" />

              <TextView
                  android:id="@+id/tv_driver_rating"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="4.5 ⭐"
                  android:textColor="#FFC107"
                  android:textSize="14sp"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintTop_toBottomOf="@+id/tv_driver_vehicle" />

              <TextView
                  android:id="@+id/tv_driver_status"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Online"
                  android:textColor="#4CAF50"
                  android:textSize="14sp"
                  android:layout_marginStart="16dp"
                  app:layout_constraintStart_toEndOf="@+id/tv_driver_rating"
                  app:layout_constraintTop_toBottomOf="@+id/tv_driver_vehicle" />

              <TextView
                  android:id="@+id/tv_driver_eta"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="ETA: 5 min"
                  android:textColor="#888888"
                  android:textSize="14sp"
                  android:layout_marginStart="16dp"
                  app:layout_constraintStart_toEndOf="@+id/tv_driver_status"
                  app:layout_constraintTop_toBottomOf="@+id/tv_driver_vehicle" />

              <View
                  android:layout_width="match_parent"
                  android:layout_height="1dp"
                  android:background="#333333"
                  android:layout_marginTop="8dp"
                  app:layout_constraintTop_toBottomOf="@+id/tv_driver_vehicle" />
          </ConstraintLayout>
          EOF

          # ---- Java: SplashActivity.java ----
          cat > app/src/main/java/com/drix/SplashActivity.java << 'EOF'
          package com.drix;

          import android.content.Intent;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.widget.ImageView;
          import androidx.appcompat.app.AppCompatActivity;
          import com.bumptech.glide.Glide;

          public class SplashActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_splash);

                  ImageView ivLoading = findViewById(R.id.iv_loading);
                  // Load a loading GIF from URL (you can replace with a local raw resource)
                  Glide.with(this)
                      .load("https://media.giphy.com/media/3o7aTskHeUcC68uW6A/giphy.gif")
                      .into(ivLoading);

                  // Delay and go to MainActivity
                  new Handler(Looper.getMainLooper()).postDelayed(() -> {
                      startActivity(new Intent(SplashActivity.this, MainActivity.class));
                      finish();
                  }, 3000);
              }
          }
          EOF

          # ---- Java: MainActivity.java (with navigation & animations) ----
          cat > app/src/main/java/com/drix/MainActivity.java << 'EOF'
          package com.drix;

          import android.animation.AnimatorInflater;
          import android.animation.AnimatorSet;
          import android.content.Context;
          import android.content.Intent;
          import android.net.ConnectivityManager;
          import android.net.NetworkInfo;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.text.TextUtils;
          import android.view.View;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.ProgressBar;
          import android.widget.TextView;
          import android.widget.Toast;

          import androidx.appcompat.app.AppCompatActivity;
          import androidx.appcompat.widget.Toolbar;
          import androidx.cardview.widget.CardView;
          import androidx.recyclerview.widget.LinearLayoutManager;
          import androidx.recyclerview.widget.RecyclerView;

          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.util.ArrayList;
          import java.util.List;
          import java.util.Random;

          public class MainActivity extends AppCompatActivity {
              private TextView tvStatus, tvDriverStatus, tvRideCount;
              private EditText etPickup, etDrop;
              private Button btnFindDriver, btnCancelRide;
              private CardView resultCard;
              private RecyclerView recyclerDrivers;
              private ProgressBar progressBar;
              private boolean isPatchLoaded = false;
              private static final String PATCH_URL = "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/DXs/libnative-lib.so";

              public native String findDriverNative(String pickup, String drop);
              public native void initDriverPoolNative();
              public native String getAllDriversNative();
              public native void updateDriverLocationsNative();

              private List<Driver> driverList = new ArrayList<>();
              private DriverAdapter driverAdapter;
              private Handler handler = new Handler(Looper.getMainLooper());
              private Runnable locationUpdater;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  tvStatus = findViewById(R.id.tv_status);
                  tvDriverStatus = findViewById(R.id.tv_driver_status);
                  tvRideCount = findViewById(R.id.tv_ride_count);
                  etPickup = findViewById(R.id.et_pickup);
                  etDrop = findViewById(R.id.et_drop);
                  btnFindDriver = findViewById(R.id.btn_find_driver);
                  btnCancelRide = findViewById(R.id.btn_cancel_ride);
                  resultCard = findViewById(R.id.result_card);
                  recyclerDrivers = findViewById(R.id.recycler_drivers);
                  progressBar = findViewById(R.id.progress_bar);

                  Toolbar toolbar = findViewById(R.id.toolbar);
                  setSupportActionBar(toolbar);
                  if (getSupportActionBar() != null) {
                      getSupportActionBar().setTitle("DriderX");
                      getSupportActionBar().setDisplayHomeAsUpEnabled(false);
                  }

                  recyclerDrivers.setLayoutManager(new LinearLayoutManager(this));
                  driverAdapter = new DriverAdapter(driverList);
                  recyclerDrivers.setAdapter(driverAdapter);

                  btnFindDriver.setEnabled(true);
                  tvStatus.setText("DriderX Engine: Core Initialized");

                  downloadAndLoadPatch();

                  btnFindDriver.setOnClickListener(v -> {
                      String pickup = etPickup.getText().toString().trim();
                      String drop = etDrop.getText().toString().trim();
                      if (TextUtils.isEmpty(pickup) || TextUtils.isEmpty(drop)) {
                          Toast.makeText(MainActivity.this, "Please enter both locations", Toast.LENGTH_SHORT).show();
                          return;
                      }
                      findDriver(pickup, drop);
                  });

                  btnCancelRide.setOnClickListener(v -> {
                      resultCard.setVisibility(View.GONE);
                      tvDriverStatus.setText("");
                      Toast.makeText(this, "Ride cancelled", Toast.LENGTH_SHORT).show();
                  });

                  if (isPatchLoaded) {
                      initDriverPoolNative();
                  }
                  startLocationUpdates();
              }

              private void findDriver(String pickup, String drop) {
                  progressBar.setVisibility(View.VISIBLE);
                  btnFindDriver.setEnabled(false);
                  resultCard.setVisibility(View.GONE);

                  new Thread(() -> {
                      if (isPatchLoaded) {
                          try {
                              String result = findDriverNative(pickup, drop);
                              runOnUiThread(() -> showResult(result));
                          } catch (Throwable t) {
                              runOnUiThread(() -> fallbackJava(pickup, drop));
                          }
                      } else {
                          runOnUiThread(() -> fallbackJava(pickup, drop));
                      }
                  }).start();
              }

              private void showResult(String result) {
                  progressBar.setVisibility(View.GONE);
                  btnFindDriver.setEnabled(true);
                  tvDriverStatus.setText(result);
                  resultCard.setVisibility(View.VISIBLE);
                  AnimatorSet anim = (AnimatorSet) AnimatorInflater.loadAnimator(this, R.animator.card_slide_in);
                  anim.setTarget(resultCard);
                  anim.start();

                  // Optionally navigate to RideDetailActivity after a delay
                  // For demo, we'll just show the card.
              }

              private void fallbackJava(String pickup, String drop) {
                  progressBar.setVisibility(View.GONE);
                  btnFindDriver.setEnabled(true);
                  String[] drivers = {"Vikram Singh", "Rajesh Kumar", "Aman Verma"};
                  String[] vehicles = {"Toyota Etios", "Maruti Dzire", "Hyundai i20"};
                  String[] regs = {"KA-03-HA-4321", "DL-01-CA-9876", "BR-01-PC-5543"};
                  Random rand = new Random();
                  int idx = rand.nextInt(3);
                  int eta = 3 + rand.nextInt(5);
                  String res = "⚡ Driver Matched (Internal Mode)!\n\n" +
                          "Driver: " + drivers[idx] + "\n" +
                          "Vehicle: " + vehicles[idx] + " (" + regs[idx] + ")\n" +
                          "Route: " + pickup + " -> " + drop + "\n" +
                          "Status: Arriving in " + eta + " mins";
                  showResult(res);
              }

              private void downloadAndLoadPatch() {
                  new Thread(() -> {
                      try {
                          File localLib = new File(getFilesDir(), "libnative-lib.so");
                          URL url = new URL(PATCH_URL);
                          HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                          conn.setConnectTimeout(8000);
                          conn.setReadTimeout(8000);
                          if (conn.getResponseCode() == HttpURLConnection.HTTP_OK) {
                              try (InputStream in = conn.getInputStream();
                                   FileOutputStream out = new FileOutputStream(localLib)) {
                                  byte[] buffer = new byte[4096];
                                  int read;
                                  while ((read = in.read(buffer)) != -1) {
                                      out.write(buffer, 0, read);
                                  }
                              }
                              System.load(localLib.getAbsolutePath());
                              isPatchLoaded = true;
                              runOnUiThread(() -> {
                                  tvStatus.setText("DriderX Engine: High-Performance Patch Active");
                                  initDriverPoolNative();
                              });
                          } else {
                              runOnUiThread(() -> tvStatus.setText("DriderX Engine: Ready (Cloud sync pending)"));
                          }
                      } catch (Throwable t) {
                          runOnUiThread(() -> tvStatus.setText("DriderX Engine: Ready (Standby Mode)"));
                      }
                  }).start();
              }

              private void startLocationUpdates() {
                  locationUpdater = () -> {
                      if (isPatchLoaded) {
                          updateDriverLocationsNative();
                          refreshDriverList();
                      }
                      handler.postDelayed(locationUpdater, 5000);
                  };
                  handler.post(locationUpdater);
              }

              private void refreshDriverList() {
                  new Thread(() -> {
                      try {
                          String data = getAllDriversNative();
                          List<Driver> updated = parseDriverData(data);
                          runOnUiThread(() -> {
                              driverList.clear();
                              driverList.addAll(updated);
                              driverAdapter.notifyDataSetChanged();
                              tvRideCount.setText("Available: " + countAvailable(updated));
                          });
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }).start();
              }

              private List<Driver> parseDriverData(String raw) {
                  List<Driver> list = new ArrayList<>();
                  if (raw == null || raw.isEmpty()) return list;
                  String[] lines = raw.split("\n");
                  for (String line : lines) {
                      if (line.trim().isEmpty()) continue;
                      String[] parts = line.split("\\|");
                      if (parts.length < 11) continue;
                      Driver d = new Driver();
                      d.id = parts[0];
                      d.name = parts[1];
                      d.vehicle = parts[2];
                      d.regNumber = parts[3];
                      d.rating = Double.parseDouble(parts[4]);
                      d.available = Boolean.parseBoolean(parts[5]);
                      d.status = parts[6];
                      d.eta = Integer.parseInt(parts[7]);
                      d.priceMultiplier = Double.parseDouble(parts[8]);
                      list.add(d);
                  }
                  return list;
              }

              private int countAvailable(List<Driver> list) {
                  int count = 0;
                  for (Driver d : list) if (d.available && "online".equals(d.status)) count++;
                  return count;
              }

              private boolean isNetworkAvailable() {
                  ConnectivityManager cm = (ConnectivityManager) getSystemService(Context.CONNECTIVITY_SERVICE);
                  NetworkInfo netInfo = cm.getActiveNetworkInfo();
                  return netInfo != null && netInfo.isConnected();
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (handler != null && locationUpdater != null) {
                      handler.removeCallbacks(locationUpdater);
                  }
              }

              @Override
              public void onBackPressed() {
                  // Handle back navigation - close app or go to previous
                  super.onBackPressed();
              }
          }
          EOF

