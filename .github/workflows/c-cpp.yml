name: DriderX – Online Patch & Split Build

on:
  workflow_dispatch:   # Manual trigger
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'DXs/**'       # Infinite loops se bachne ke liye

jobs:
  patch-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # FIX: Purane pre-existing files ko delete karo taaki global Gradle 9.6.0 unhe read na kare
      - name: Clean Environment & Generate Wrapper Safely
        run: |
          rm -f settings.gradle build.gradle gradle.properties app/build.gradle
          gradle wrapper --gradle-version 7.5.1

      - name: Create Structure & Injection (Without Internal C++)
        run: |
          mkdir -p app/src/main/java/com/drix
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p native/src/main/cpp
          mkdir -p server/src
          mkdir -p DXs

          # 1. Root Level Settings
          cat > settings.gradle << 'EOF'
          rootProject.name = "DriderX"
          include ':app'
          EOF

          # 2. Modify app/build.gradle (Target SDK 28 for dynamic loading bypass)
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace "com.drix"
              compileSdk 33
              defaultConfig {
                  applicationId "com.drix"
                  minSdk 21
                  targetSdk 28
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # 3. AndroidManifest.xml (Added Internet Permission)
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.drix">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              
              <application android:label="DriderX">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 4. MainActivity.java (Online Downloading & System.load Engine)
          cat > app/src/main/java/com/drix/MainActivity.java << 'EOF'
          package com.drix;
          import androidx.appcompat.app.AppCompatActivity;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.widget.TextView;
          import android.util.Log;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;

          public class MainActivity extends AppCompatActivity {
              private TextView tv;
              private static final String PATCH_URL = "https://raw.githubusercontent.com/treeklyz-afk/Heavyx/main/DXs/libnative-lib.so";
              
              public native String stringFromJNI();

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  tv = findViewById(R.id.sample_text);
                  tv.setText("Checking for online patches...");

                  downloadAndLoadPatch();
              }

              private void downloadAndLoadPatch() {
                  new Thread(new Runnable() {
                      @Override
                      public void run() {
                          try {
                              File localLib = new File(getFilesDir(), "libnative-lib.so");
                              
                              URL url = new URL(PATCH_URL);
                              HttpURLConnection connection = (HttpURLConnection) url.openConnection();
                              connection.setConnectTimeout(15000);
                              connection.setReadTimeout(15000);
                              connection.connect();

                              if (connection.getResponseCode() == HttpURLConnection.HTTP_OK) {
                                  InputStream input = connection.getInputStream();
                                  FileOutputStream output = new FileOutputStream(localLib);

                                  byte[] buffer = new byte[4096];
                                  int bytesRead;
                                  while ((bytesRead = input.read(buffer)) != -1) {
                                      output.write(buffer, 0, bytesRead);
                                  }

                                  output.flush();
                                  output.close();
                                  input.close();

                                  // Load the dynamic patch securely
                                  System.load(localLib.getAbsolutePath());

                                  new Handler(Looper.getMainLooper()).post(new Runnable() {
                                      @Override
                                      public void run() {
                                          try {
                                              tv.setText(stringFromJNI());
                                          } catch (UnsatisfiedLinkError e) {
                                              tv.setText("JNI Execution Link Failure!");
                                          }
                                      }
                                  });
                              } else {
                                  showError("Patch Server Error: " + connection.getResponseCode());
                              }
                          } catch (final Exception e) {
                              Log.e("DriderX", "Patch failed", e);
                              showError("Patch offline or failed to sync!");
                          }
                      }
                  }).start();
              }

              private void showError(final String msg) {
                  new Handler(Looper.getMainLooper()).post(new Runnable() {
                      @Override
                      public void run() {
                          tv.setText(msg);
                      }
                  });
              }
          }
          EOF

          # 5. Resource files
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:gravity="center"
              android:orientation="vertical">
              <TextView android:id="@+id/sample_text"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:textSize="18sp"
                  android:text="Initializing..." />
          </LinearLayout>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">DriderX</string>
          </resources>
          EOF

          # 6. Native CMake & Source Structure
          cat > native/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.18)
          project("native-lib")
          add_library(native-lib SHARED src/main/cpp/native-lib.cpp)
          find_library(log-lib log)
          target_link_libraries(native-lib ${log-lib})
          EOF

          cat > native/src/main/cpp/native-lib.cpp << 'EOF'
          #include <jni.h>
          #include <string>
          extern "C" JNIEXPORT jstring JNICALL
          Java_com_drix_MainActivity_stringFromJNI(JNIEnv* env, jobject thiz) {
              return env->NewStringUTF("Hello from DriderX Online Live Patch!");
          }
          EOF

          # 7. Server Build Source
          cat > server/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.10)
          project(DriderXServer)
          add_executable(driderx_server src/main.cpp)
          target_link_libraries(driderx_server pthread)
          EOF

          cat > server/src/main.cpp << 'EOF'
          #include <iostream>
          int main() {
              std::cout << "DriderX Patching Host Server Initialized." << std::endl;
              return 0;
          }
          EOF

          # 8. Main Configs
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral(); }
              dependencies { classpath 'com.android.tools.build:gradle:7.4.0' }
          }
          allprojects { repositories { google(); mavenCentral(); } }
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK & NDK Toolchain
        uses: android-actions/setup-android@v3

      - name: Install NDK Components
        run: sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Compile Library Independently (Separate Output)
        run: |
          mkdir -p native/build
          cd native/build
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/25.2.9519653/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-21 \
                ..
          make -j$(nproc)
          cp libnative-lib.so ../../DXs/
          echo "✅ Native binary compiled separately inside DXs folder"

      - name: Compile Pure APK (No Native Code Embedded)
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk DXs/driderx-base.apk
          echo "✅ Pure Base APK added to DXs folder"

      - name: Deploy Isolated Binaries to DXs Folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Refresh architecture: Separate APK and Online .so patch [skip ci]" || echo "No changes"
          git push origin HEAD:${{ github.ref_name }}
